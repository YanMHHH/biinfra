<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAP Mockup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: #f5f5f5;
            margin: 0;
        }

        .content-frame {
            width: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe class="content-frame" id="contentFrame"></iframe>

    <script>
        const frame = document.getElementById('contentFrame');
        frame.src = './toB HTML/NAP_tob_mockup_v1_20260324.html';

        frame.onload = () => {
            const resizeFrame = () => {
                frame.style.height = frame.contentDocument.documentElement.scrollHeight + 'px';
            };
            resizeFrame();
            frame.contentWindow.addEventListener('resize', resizeFrame);
        };
    </script>
</body>
</html>
