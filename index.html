<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAP Mockup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            z-index: 10;
        }

        .version-selector {
            padding: 6px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 13px;
            background: #fff;
            cursor: pointer;
        }

        .content-frame {
            flex: 1;
            border: none;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <select class="version-selector" id="versionSelector">
            <option value="./toB HTML/NAP_tob_mockup_v1_20260324.html">NAP-mockup-v1-20260324</option>
        </select>
    </div>
    <iframe class="content-frame" id="contentFrame"></iframe>

    <script>
        const versionSelector = document.getElementById('versionSelector');
        const contentFrame = document.getElementById('contentFrame');

        versionSelector.addEventListener('change', () => {
            contentFrame.src = versionSelector.value;
        });

        contentFrame.src = versionSelector.value;
    </script>
</body>
</html>
